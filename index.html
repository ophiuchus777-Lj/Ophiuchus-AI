<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ophiuchus AI · Absolute</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    :root { --p: #a84aff; --bg: #050508; --glass: rgba(255, 255, 255, 0.03); }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { background: var(--bg); color: #fff; overflow: hidden; height: 100vh; }

    .bg-main { position: fixed; inset: 0; z-index: 0; background: radial-gradient(circle at top right, #101020 0%, #050508 100%); }
    .grid { position: absolute; inset: 0; background-image: radial-gradient(rgba(168,74,255,0.1) 1px, transparent 1px); background-size: 30px 30px; }

    #app { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; opacity: 0; transition: opacity 0.8s; }

    header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.6); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(168,74,255,0.2); }
    .s-logo { width: 40px; height: 40px; filter: drop-shadow(0 0 8px var(--p)); }

    #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
    .msg { max-width: 85%; padding: 14px 18px; border-radius: 22px; font-size: 0.95rem; line-height: 1.5; animation: msgFade 0.3s ease; }
    .msg.user { align-self: flex-end; background: #fff; color: #000; border-bottom-right-radius: 4px; }
    .msg.bot { align-self: flex-start; background: var(--glass); border: 1px solid rgba(168,74,255,0.15); border-bottom-left-radius: 4px; backdrop-filter: blur(15px); }
    .preview { max-width: 100%; border-radius: 12px; margin-top: 8px; border: 1px solid var(--p); }
    .doc-box { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; display: flex; align-items: center; gap: 10px; font-size: 0.8rem; }

    .dock-area { padding: 15px 15px 35px; position: relative; }
    .dock-main { background: rgba(20,20,30,0.8); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; padding: 6px; display: flex; align-items: center; gap: 8px; }
    #inp { flex: 1; background: transparent; border: none; color: #fff; padding: 10px 15px; outline: none; font-size: 1rem; }
    
    .btn { width: 45px; height: 45px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
    .btn-plus { color: var(--p); background: rgba(168,74,255,0.1); }
    .btn-plus.active { transform: rotate(45deg); color: #ff4a4a; }
    .btn-send { background: rgba(255,255,255,0.05); color: #444; }
    .btn-send.ready { background: #fff; color: #000; box-shadow: 0 0 20px #fff; }
    .btn-send.recording { background: #ff4a4a; color: #fff; animation: pulse 1s infinite; }

    #tools-pop { position: absolute; bottom: 85px; left: 15px; display: none; flex-direction: column; gap: 10px; }
    .t-btn { width: 45px; height: 45px; border-radius: 15px; background: #111; border: 1px solid #333; color: #fff; cursor: pointer; animation: pop 0.3s ease; }

    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
    .v-card { background: #08080c; border: 1px solid var(--p); padding: 25px; border-radius: 30px; width: 92%; max-width: 400px; max-height: 80vh; overflow-y: auto; }
    .v-in { width: 100%; background: #000; border: 1px solid #222; padding: 12px; border-radius: 12px; color: #fff; margin: 6px 0 12px; outline: none; font-size: 0.8rem; }
    .v-label { font-size: 0.65rem; color: var(--p); font-weight: 800; text-transform: uppercase; }

    #start { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; align-items: center; justify-content: center; flex-direction: column; cursor: pointer; }
    .start-name { margin-top: 30px; font-size: 1.2rem; letter-spacing: 12px; font-weight: 300; color: #fff; text-transform: uppercase; }
    .start-copy { position: absolute; bottom: 40px; font-size: 0.6rem; color: #444; text-transform: uppercase; }

    .security-note { font-size: 0.6rem; color: #888; margin-top: 10px; text-align: center; border-top: 1px solid #222; padding-top: 10px; }
    
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    @keyframes msgFade { from { opacity: 0; transform: translateY(10px); } }
  </style>
</head>
<body>

  <div class="bg-main"><div class="grid"></div></div>
  
  <input type="file" id="img-in" style="display: none;" accept="image/*">
  <input type="file" id="cam-in" style="display: none;" accept="image/*" capture="camera">
  <input type="file" id="doc-in" style="display: none;" accept=".pdf,.doc,.docx,.txt">

  <div id="start" onclick="go()">
    <div class="s-logo" style="transform: scale(4.5);">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M30 70C30 70 20 60 20 45C20 30 35 20 50 20C65 20 80 30 80 45C80 60 70 70 50 70C30 70 20 80 20 90" stroke="#a84aff" stroke-width="8" stroke-linecap="round"/>
            <circle cx="70" cy="40" r="3" fill="white"/>
        </svg>
    </div>
    <div class="start-name">Ophiuchus</div>
    <div class="start-copy">© 2026 Ophiuchus AI · All Rights Reserved</div>
  </div>

  <div id="app">
    <header>
      <div class="s-logo">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M30 70C30 70 20 60 20 45C20 30 35 20 50 20C65 20 80 30 80 45C80 60 70 70 50 70C30 70 20 80 20 90" stroke="#a84aff" stroke-width="8" stroke-linecap="round"/>
            <circle cx="70" cy="40" r="2" fill="white"/>
        </svg>
      </div>
      <div style="font-size: 0.8rem; color: var(--p); font-weight: 900; letter-spacing: 2px;">OPHIUCHUS AI</div>
      <button onclick="togV()" style="background:none; border:none; color:#fff; font-size: 1.2rem;"><i class="fas fa-vault"></i></button>
    </header>

    <div id="chat-box"></div>

    <div class="dock-area">
      <div id="tools-pop">
        <button class="t-btn" title="Gallery" onclick="document.getElementById('img-in').click(); togT();"><i class="fas fa-image"></i></button>
        <button class="t-btn" title="Camera" onclick="document.getElementById('cam-in').click(); togT();"><i class="fas fa-camera"></i></button>
        <button class="t-btn" title="Document" onclick="document.getElementById('doc-in').click(); togT();"><i class="fas fa-file-alt"></i></button>
      </div>
      <div class="dock-main">
        <button class="btn btn-plus" id="p-btn" onclick="togT()"><i class="fas fa-plus"></i></button>
        <input type="text" id="inp" placeholder="Whisper something..." oninput="sync()">
        <button id="s-btn" class="btn btn-send" onclick="handleSend()">
          <i id="s-ico" class="fas fa-microphone"></i>
        </button>
      </div>
    </div>
  </div>

  <div class="modal" id="vault">
    <div class="v-card">
      <h3 style="margin-bottom: 20px; color: var(--p); text-align: center;">INFINITE VAULT</h3>
      <div id="key-list"></div>
      
      <button onclick="clearAllKeys()" style="width:100%; padding:12px; border-radius:12px; background:#333; color:#fff; border:none; font-weight:600; margin-top:10px;">🗑️ HAPUS SEMUA KEY</button>
      <button onclick="saveK()" style="width:100%; padding:15px; border-radius:12px; background:#fff; color:#000; border:none; font-weight:800; margin-top:10px;">SAVE ALL KEYS</button>
      
      <div class="security-note">
        ⚠️ Key disimpan di browser Anda. Jangan gunakan di perangkat publik. Key akan hilang jika tab ditutup (session storage).
      </div>
      
      <p onclick="togV()" style="margin-top:20px; color:#444; cursor:pointer; font-size:0.7rem; text-align: center;">DISMISS</p>
    </div>
  </div>

  <script>
    (function() {
      "use strict";

      // ========== AMAN: Tangkap error global ==========
      window.addEventListener('error', function(e) {
        console.error('Global error:', e.error);
      });

      // ========== STATE & STORAGE ==========
      const STORAGE = sessionStorage;

      // ========== ELEMEN (dengan pengecekan) ==========
      const startEl = document.getElementById('start');
      const appEl = document.getElementById('app');
      const chatBox = document.getElementById('chat-box');
      const inp = document.getElementById('inp');
      const sendBtn = document.getElementById('s-btn');
      const sIco = document.getElementById('s-ico');
      const pBtn = document.getElementById('p-btn');
      const toolsPop = document.getElementById('tools-pop');
      const vaultModal = document.getElementById('vault');
      const keyListDiv = document.getElementById('key-list');
      const imgIn = document.getElementById('img-in');
      const camIn = document.getElementById('cam-in');
      const docIn = document.getElementById('doc-in');

      // ========== FUNGSI GO (pastikan start hilang) ==========
      window.go = function() {
        try {
          if (startEl) startEl.style.display = 'none';
          if (appEl) appEl.style.opacity = '1';
        } catch (err) {
          console.error('Error in go:', err);
          // Fallback: paksa sembunyi
          if (startEl) startEl.style.display = 'none';
          if (appEl) appEl.style.opacity = '1';
        }
      };

      // ========== VAULT (KEY LIST) ==========
      const keys = ['Gemini', 'Groq', 'OpenAI', 'Claude', 'Perplexity', 'Mistral', 'OpenRouter', 'HuggingFace'];
      if (keyListDiv) {
        keys.forEach(k => {
          const saved = STORAGE.getItem(`ophi_${k.toLowerCase()}`) || '';
          keyListDiv.innerHTML += `<label class="v-label">${k}</label><input type="password" id="k-${k.toLowerCase()}" class="v-in" placeholder="Paste Key..." value="${saved}">`;
        });
      }

      // ========== SPEECH RECOGNITION (dengan fallback) ==========
      let isRecording = false;
      let recognition = null;
      if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new Speech();
        recognition.lang = 'id-ID';
        recognition.continuous = false;

        recognition.onstart = () => {
          isRecording = true;
          sendBtn.classList.add('recording');
          inp.placeholder = "Listening...";
        };

        recognition.onresult = (e) => {
          inp.value = e.results[0][0].transcript;
          sync();
        };

        recognition.onend = () => {
          isRecording = false;
          sendBtn.classList.remove('recording');
          inp.placeholder = "Whisper something...";
        };
      } else {
        console.warn('Speech recognition tidak didukung browser ini.');
      }

      // ========== FUNGSI-FUNGSI UTAMA ==========
      window.togT = function() {
        if (toolsPop && pBtn) {
          toolsPop.style.display = toolsPop.style.display === 'flex' ? 'none' : 'flex';
          pBtn.classList.toggle('active');
        }
      };

      window.upFile = function(input, type) {
        try {
          if (input.files && input.files[0]) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
              if(type === 'img') {
                addMsg(`Sent a photo`, 'user', e.target.result);
              } else {
                addMsg(`Sent: ${file.name}`, 'user', null, true);
              }
              setTimeout(() => { botSay("Ophiuchus AI: File received. Processing content..."); }, 600);
            };
            reader.readAsDataURL(file);
          }
        } catch (err) {
          console.error('upFile error:', err);
        }
      };

      // Pasang event untuk input file
      if (imgIn) imgIn.onchange = function() { upFile(this, 'img'); };
      if (camIn) camIn.onchange = function() { upFile(this, 'img'); };
      if (docIn) docIn.onchange = function() { upFile(this, 'doc'); };

      window.sync = function() {
        if (!inp || !sendBtn || !sIco) return;
        if (inp.value.trim().length > 0) {
          sendBtn.classList.add('ready');
          sIco.className = "fas fa-paper-plane";
        } else {
          sendBtn.classList.remove('ready');
          sIco.className = "fas fa-microphone";
        }
      };

      // ========== API KEYS ==========
      function getActiveAPI() {
        const providers = [
          { name: 'Gemini', keyName: 'ophi_gemini', endpoint: 'https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=' },
          { name: 'Groq', keyName: 'ophi_groq', endpoint: 'https://api.groq.com/openai/v1/chat/completions' },
          { name: 'OpenAI', keyName: 'ophi_openai', endpoint: 'https://api.openai.com/v1/chat/completions' },
          { name: 'Claude', keyName: 'ophi_claude', endpoint: 'https://api.anthropic.com/v1/messages' },
          { name: 'Perplexity', keyName: 'ophi_perplexity', endpoint: 'https://api.perplexity.ai/chat/completions' },
          { name: 'Mistral', keyName: 'ophi_mistral', endpoint: 'https://api.mistral.ai/v1/chat/completions' },
          { name: 'OpenRouter', keyName: 'ophi_openrouter', endpoint: 'https://openrouter.ai/api/v1/chat/completions' },
          { name: 'HuggingFace', keyName: 'ophi_huggingface', endpoint: 'https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.1' }
        ];
        for (let p of providers) {
          const key = STORAGE.getItem(p.keyName);
          if (key && key.trim() !== '') {
            return { provider: p.name, key: key.trim(), endpoint: p.endpoint };
          }
        }
        return null;
      }

      async function callAI(prompt, provider, apiKey) {
        let url, options;
        switch (provider) {
          case 'Groq':
            url = 'https://api.groq.com/openai/v1/chat/completions';
            options = {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${apiKey}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                model: 'llama-3.3-70b-versatile',
                messages: [{ role: 'user', content: prompt }],
                temperature: 0.7
              })
            };
            break;
          case 'OpenAI':
            url = 'https://api.openai.com/v1/chat/completions';
            options = {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${apiKey}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                model: 'gpt-3.5-turbo',
                messages: [{ role: 'user', content: prompt }]
              })
            };
            break;
          case 'Gemini':
            url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`;
            options = {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            };
            break;
          case 'Claude':
            url = 'https://api.anthropic.com/v1/messages';
            options = {
              method: 'POST',
              headers: {
                'x-api-key': apiKey,
                'anthropic-version': '2023-06-01',
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                model: 'claude-3-haiku-20240307',
                messages: [{ role: 'user', content: prompt }],
                max_tokens: 1024
              })
            };
            break;
          case 'Perplexity':
            url = 'https://api.perplexity.ai/chat/completions';
            options = {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${apiKey}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                model: 'llama-3-sonar-small-32k-online',
                messages: [{ role: 'user', content: prompt }]
              })
            };
            break;
          case 'Mistral':
            url = 'https://api.mistral.ai/v1/chat/completions';
            options = {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${apiKey}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                model: 'mistral-small-latest',
                messages: [{ role: 'user', content: prompt }]
              })
            };
            break;
          case 'OpenRouter':
            url = 'https://openrouter.ai/api/v1/chat/completions';
            options = {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${apiKey}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                model: 'mistralai/mistral-7b-instruct',
                messages: [{ role: 'user', content: prompt }]
              })
            };
            break;
          case 'HuggingFace':
            url = 'https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.1';
            options = {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${apiKey}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({ inputs: prompt })
            };
            break;
          default:
            throw new Error('Provider tidak dikenal');
        }

        const response = await fetch(url, options);
        if (!response.ok) {
          const err = await response.text();
          throw new Error(`HTTP ${response.status}: ${err}`);
        }
        const data = await response.json();

        if (provider === 'Groq' || provider === 'OpenAI' || provider === 'Perplexity' || provider === 'Mistral' || provider === 'OpenRouter') {
          return data.choices[0].message.content;
        } else if (provider === 'Gemini') {
          return data.candidates[0].content.parts[0].text;
        } else if (provider === 'Claude') {
          return data.content[0].text;
        } else if (provider === 'HuggingFace') {
          return Array.isArray(data) ? data[0].generated_text : data.generated_text;
        }
        return JSON.stringify(data);
      }

      // ========== FUNGSI TAMBAHAN PESAN ==========
      function botSay(t) {
        if (!chatBox) return;
        const d = document.createElement('div');
        d.className = 'msg bot'; d.innerText = t;
        chatBox.appendChild(d); chatBox.scrollTop = chatBox.scrollHeight;
      }

      function addMsg(t, type, img = null, isDoc = false) {
        if (!chatBox) return;
        const d = document.createElement('div');
        d.className = `msg ${type}`;
        d.innerText = t;
        if(img) {
          const i = document.createElement('img'); i.src = img; i.className = 'preview';
          d.appendChild(i);
        }
        if(isDoc) {
          const box = document.createElement('div');
          box.className = 'doc-box';
          box.innerHTML = `<i class="fas fa-file-pdf"></i> Document Attached`;
          d.appendChild(box);
        }
        chatBox.appendChild(d); chatBox.scrollTop = chatBox.scrollHeight;
      }

      // ========== HANDLE SEND ==========
      window.handleSend = async function() {
        try {
          if (sendBtn.classList.contains('ready')) {
            const userText = inp.value.trim();
            if (!userText) return;

            addMsg(userText, 'user');
            inp.value = ""; sync();

            const typingMsg = document.createElement('div');
            typingMsg.className = 'msg bot';
            typingMsg.id = 'typing-indicator';
            typingMsg.innerText = 'Ophiuchus AI is thinking...';
            chatBox.appendChild(typingMsg);
            chatBox.scrollTop = chatBox.scrollHeight;

            const active = getActiveAPI();
            if (!active) {
              botSay("⚠️ Tidak ada API key yang valid. Silakan masukkan key di Vault.");
              document.getElementById('typing-indicator')?.remove();
              return;
            }

            const reply = await callAI(userText, active.provider, active.key);
            document.getElementById('typing-indicator')?.remove();
            botSay(reply);
          } else {
            if (recognition) {
              isRecording ? recognition.stop() : recognition.start();
            } else {
              alert("Voice not supported on this browser.");
            }
          }
        } catch (error) {
          console.error('handleSend error:', error);
          document.getElementById('typing-indicator')?.remove();
          botSay(`❌ Error: ${error.message}`);
        }
      };

      // ========== VAULT FUNCTIONS ==========
      window.togV = function() {
        if (vaultModal) {
          vaultModal.style.display = vaultModal.style.display === 'flex' ? 'none' : 'flex';
        }
      };

      window.saveK = function() {
        try {
          keys.forEach(k => {
            const el = document.getElementById(`k-${k.toLowerCase()}`);
            if (el) STORAGE.setItem(`ophi_${k.toLowerCase()}`, el.value);
          });
          togV();
          alert("Vault Locked (keys stored in session).");
        } catch (err) {
          console.error('saveK error:', err);
        }
      };

      window.clearAllKeys = function() {
        if (confirm("Hapus semua API key dari browser?")) {
          keys.forEach(k => {
            STORAGE.removeItem(`ophi_${k.toLowerCase()}`);
            const el = document.getElementById(`k-${k.toLowerCase()}`);
            if (el) el.value = '';
          });
          alert("Semua key telah dihapus.");
        }
      };

      // ========== PASTIKAN START BISA DIKLIK ==========
      if (startEl) {
        startEl.style.cursor = 'pointer';
        // Sudah ada onclick="go()" di HTML, tapi jika gagal, kita pasang lagi
        startEl.addEventListener('click', function(e) {
          e.preventDefault();
          go();
        });
      }

      // ========== INIT: sembunyikan app dulu ==========
      if (appEl) appEl.style.opacity = '0';
    })();
  </script>
</body>
</html>
