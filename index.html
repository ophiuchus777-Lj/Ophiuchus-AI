<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ophiuchus AI · Absolute</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    :root { --p: #a84aff; --bg: #050508; --glass: rgba(255, 255, 255, 0.03); }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { background: var(--bg); color: #fff; overflow: hidden; height: 100vh; }

    .bg-main { position: fixed; inset: 0; z-index: 0; background: radial-gradient(circle at top right, #101020 0%, #050508 100%); }
    .grid { position: absolute; inset: 0; background-image: radial-gradient(rgba(168,74,255,0.1) 1px, transparent 1px); background-size: 30px 30px; }

    #app { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; opacity: 0; transition: 0.8s; }

    header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.6); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(168,74,255,0.2); }
    .s-logo { width: 40px; height: 40px; filter: drop-shadow(0 0 8px var(--p)); }

    #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
    .msg { max-width: 85%; padding: 14px 18px; border-radius: 22px; font-size: 0.95rem; line-height: 1.5; animation: msgFade 0.3s ease; }
    .msg.user { align-self: flex-end; background: #fff; color: #000; border-bottom-right-radius: 4px; }
    .msg.bot { align-self: flex-start; background: var(--glass); border: 1px solid rgba(168,74,255,0.15); border-bottom-left-radius: 4px; backdrop-filter: blur(15px); }
    .preview { max-width: 100%; border-radius: 12px; margin-top: 8px; border: 1px solid var(--p); }
    .doc-box { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; display: flex; align-items: center; gap: 10px; font-size: 0.8rem; }

    .dock-area { padding: 15px 15px 35px; position: relative; }
    .dock-main { background: rgba(20,20,30,0.8); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; padding: 6px; display: flex; align-items: center; gap: 8px; }
    #inp { flex: 1; background: transparent; border: none; color: #fff; padding: 10px 15px; outline: none; font-size: 1rem; }
    
    .btn { width: 45px; height: 45px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
    .btn-plus { color: var(--p); background: rgba(168,74,255,0.1); }
    .btn-plus.active { transform: rotate(45deg); color: #ff4a4a; }
    .btn-send { background: rgba(255,255,255,0.05); color: #444; }
    .btn-send.ready { background: #fff; color: #000; box-shadow: 0 0 20px #fff; }
    .btn-send.recording { background: #ff4a4a; color: #fff; animation: pulse 1s infinite; }

    #tools-pop { position: absolute; bottom: 85px; left: 15px; display: none; flex-direction: column; gap: 10px; }
    .t-btn { width: 45px; height: 45px; border-radius: 15px; background: #111; border: 1px solid #333; color: #fff; cursor: pointer; animation: pop 0.3s ease; }

    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
    .v-card { background: #08080c; border: 1px solid var(--p); padding: 25px; border-radius: 30px; width: 92%; max-width: 400px; max-height: 80vh; overflow-y: auto; }
    .v-in { width: 100%; background: #000; border: 1px solid #222; padding: 12px; border-radius: 12px; color: #fff; margin: 6px 0 12px; outline: none; font-size: 0.8rem; }
    .v-label { font-size: 0.65rem; color: var(--p); font-weight: 800; text-transform: uppercase; }

    #start { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; align-items: center; justify-content: center; flex-direction: column; cursor: pointer; }
    .start-name { margin-top: 30px; font-size: 1.2rem; letter-spacing: 12px; font-weight: 300; color: #fff; text-transform: uppercase; }
    .start-copy { position: absolute; bottom: 40px; font-size: 0.6rem; color: #444; text-transform: uppercase; }
    
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    @keyframes msgFade { from { opacity: 0; transform: translateY(10px); } }
  </style>
</head>
<body>

  <div class="bg-main"><div class="grid"></div></div>
  
  <input type="file" id="img-in" style="display: none;" accept="image/*" onchange="upFile(this, 'img')">
  <input type="file" id="cam-in" style="display: none;" accept="image/*" capture="camera" onchange="upFile(this, 'img')">
  <input type="file" id="doc-in" style="display: none;" accept=".pdf,.doc,.docx,.txt" onchange="upFile(this, 'doc')">

  <div id="start" onclick="go()">
    <div class="s-logo" style="transform: scale(4.5);">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M30 70C30 70 20 60 20 45C20 30 35 20 50 20C65 20 80 30 80 45C80 60 70 70 50 70C30 70 20 80 20 90" stroke="#a84aff" stroke-width="8" stroke-linecap="round"/>
            <circle cx="70" cy="40" r="3" fill="white"/>
        </svg>
    </div>
    <div class="start-name">Ophiuchus</div>
    <div class="start-copy">© 2026 Ophiuchus AI · All Rights Reserved</div>
  </div>

  <div id="app">
    <header>
      <div class="s-logo">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M30 70C30 70 20 60 20 45C20 30 35 20 50 20C65 20 80 30 80 45C80 60 70 70 50 70C30 70 20 80 20 90" stroke="#a84aff" stroke-width="8" stroke-linecap="round"/>
            <circle cx="70" cy="40" r="2" fill="white"/>
        </svg>
      </div>
      <div style="font-size: 0.8rem; color: var(--p); font-weight: 900; letter-spacing: 2px;">OPHIUCHUS AI</div>
      <button onclick="togV()" style="background:none; border:none; color:#fff; font-size: 1.2rem;"><i class="fas fa-vault"></i></button>
    </header>

    <div id="chat-box"></div>

    <div class="dock-area">
      <div id="tools-pop">
        <button class="t-btn" title="Gallery" onclick="document.getElementById('img-in').click(); togT();"><i class="fas fa-image"></i></button>
        <button class="t-btn" title="Camera" onclick="document.getElementById('cam-in').click(); togT();"><i class="fas fa-camera"></i></button>
        <button class="t-btn" title="Document" onclick="document.getElementById('doc-in').click(); togT();"><i class="fas fa-file-alt"></i></button>
      </div>
      <div class="dock-main">
        <button class="btn btn-plus" id="p-btn" onclick="togT()"><i class="fas fa-plus"></i></button>
        <input type="text" id="inp" placeholder="Whisper something..." oninput="sync()">
        <button id="s-btn" class="btn btn-send" onclick="handleSend()">
          <i id="s-ico" class="fas fa-microphone"></i>
        </button>
      </div>
    </div>
  </div>

  <div class="modal" id="vault">
    <div class="v-card">
      <h3 style="margin-bottom: 20px; color: var(--p); text-align: center;">INFINITE VAULT</h3>
      <div id="key-list"></div>
      <button onclick="saveK()" style="width:100%; padding:15px; border-radius:12px; background:#fff; color:#000; border:none; font-weight:800; margin-top:10px;">SAVE ALL KEYS</button>
      <p onclick="togV()" style="margin-top:20px; color:#444; cursor:pointer; font-size:0.7rem; text-align: center;">DISMISS</p>
    </div>
  </div>

  <script>
    // ==================== KODE ASLI (tidak diubah) ====================
    const keys = ['Gemini', 'Groq', 'OpenAI', 'Claude', 'Perplexity', 'Mistral', 'OpenRouter', 'HuggingFace'];
    const container = document.getElementById('key-list');
    keys.forEach(k => {
        container.innerHTML += `<label class="v-label">${k}</label><input type="password" id="k-${k.toLowerCase()}" class="v-in" placeholder="Paste Key...">`;
    });

    const input = document.getElementById('inp');
    const sendBtn = document.getElementById('s-btn');
    const sIco = document.getElementById('s-ico');
    let isRecording = false;
    let recognition;

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new Speech();
        recognition.lang = 'id-ID';
        recognition.continuous = false;

        recognition.onstart = () => {
            isRecording = true;
            sendBtn.classList.add('recording');
            input.placeholder = "Listening...";
        };

        recognition.onresult = (e) => {
            input.value = e.results[0][0].transcript;
            sync();
        };

        recognition.onend = () => {
            isRecording = false;
            sendBtn.classList.remove('recording');
            input.placeholder = "Whisper something...";
        };
    }

    function togT() {
        const m = document.getElementById('tools-pop');
        const b = document.getElementById('p-btn');
        m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
        b.classList.toggle('active');
    }

    function upFile(input, type) {
        if (input.files && input.files[0]) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                if(type === 'img') {
                    addMsg(`Sent a photo`, 'user', e.target.result);
                } else {
                    addMsg(`Sent: ${file.name}`, 'user', null, true);
                }
                setTimeout(() => { botSay("Ophiuchus AI: File received. Processing content..."); }, 600);
            };
            reader.readAsDataURL(file);
        }
    }

    function sync() {
        if(input.value.trim().length > 0) {
            sendBtn.classList.add('ready'); sIco.className = "fas fa-paper-plane";
        } else {
            sendBtn.classList.remove('ready'); sIco.className = "fas fa-microphone";
        }
    }

    function botSay(t) {
        const c = document.getElementById('chat-box');
        const d = document.createElement('div');
        d.className = 'msg bot'; d.innerText = t;
        c.appendChild(d); c.scrollTop = c.scrollHeight;
    }

    function addMsg(t, type, img = null, isDoc = false) {
        const c = document.getElementById('chat-box');
        const d = document.createElement('div');
        d.className = `msg ${type}`;
        d.innerText = t;
        if(img) {
            const i = document.createElement('img'); i.src = img; i.className = 'preview';
            d.appendChild(i);
        }
        if(isDoc) {
            const box = document.createElement('div');
            box.className = 'doc-box';
            box.innerHTML = `<i class="fas fa-file-pdf"></i> Document Attached`;
            d.appendChild(box);
        }
        c.appendChild(d); c.scrollTop = c.scrollHeight;
    }

    function go() {
        console.log('go() dipanggil');
        document.getElementById('start').style.opacity = '0';
        setTimeout(() => { 
            document.getElementById('start').style.display = 'none'; 
            document.getElementById('app').style.opacity = '1'; 
        }, 500);
    }

    function togV() {
        const v = document.getElementById('vault');
        v.style.display = v.style.display === 'flex' ? 'none' : 'flex';
    }

    function saveK() {
        keys.forEach(k => localStorage.setItem(`ophi_${k.toLowerCase()}`, document.getElementById(`k-${k.toLowerCase()}`).value));
        togV(); alert("Vault Locked.");
    }

    // ==================== BAGIAN TAMBAHAN (DENGAN PENGECEKAN) ====================
    // Pastikan container ada sebelum menambahkan elemen
    if (container) {
        // Tambahkan dropdown pemilih AI
        const selectHtml = `
            <label class="v-label" style="margin-top:15px;">AKTIFKAN AI</label>
            <select id="active-provider" class="v-in">
                <option value="gemini">Gemini</option>
                <option value="groq">Groq</option>
                <option value="openai">OpenAI (GPT-3.5)</option>
                <option value="claude">Claude (segera)</option>
                <option value="perplexity">Perplexity (segera)</option>
                <option value="mistral">Mistral (segera)</option>
                <option value="openrouter">OpenRouter (segera)</option>
                <option value="huggingface">HuggingFace (segera)</option>
            </select>
        `;
        container.insertAdjacentHTML('beforeend', selectHtml);

        // Tambahkan dropdown model Groq
        const groqModelHtml = `
            <div id="groq-model-container" style="display: none;">
                <label class="v-label">Groq Model</label>
                <select id="groq-model-select" class="v-in">
                    <option value="llama-3.3-70b-versatile">llama-3.3-70b-versatile</option>
                    <option value="llama-3.1-8b-instant">llama-3.1-8b-instant</option>
                    <option value="mixtral-8x7b-32768">mixtral-8x7b-32768 (mungkin deprecated)</option>
                    <option value="gemma2-9b-it">gemma2-9b-it</option>
                    <option value="groq/compound">groq/compound</option>
                    <option value="custom">Lainnya (isi manual)</option>
                </select>
                <input type="text" id="groq-model-custom" class="v-in" placeholder="Masukkan nama model" style="display: none; margin-top:5px;">
                <p style="color:#666; font-size:0.6rem; margin-top:-5px;">Pilih model atau isi manual</p>
            </div>
        `;
        container.insertAdjacentHTML('beforeend', groqModelHtml);
    } else {
        console.error('Container key-list tidak ditemukan!');
    }

    // Event listener untuk menampilkan/menyembunyikan elemen berdasarkan pilihan
    document.addEventListener('change', function(e) {
        if (e.target.id === 'groq-model-select') {
            const customInput = document.getElementById('groq-model-custom');
            if (customInput) {
                customInput.style.display = e.target.value === 'custom' ? 'block' : 'none';
            }
        }
        if (e.target.id === 'active-provider') {
            const groqDiv = document.getElementById('groq-model-container');
            if (groqDiv) {
                groqDiv.style.display = e.target.value === 'groq' ? 'block' : 'none';
            }
        }
    });

    // Override saveK dengan aman
    const originalSaveK = saveK;
    saveK = function() {
        // Simpan semua key
        keys.forEach(k => {
            const el = document.getElementById(`k-${k.toLowerCase()}`);
            if (el) localStorage.setItem(`ophi_${k.toLowerCase()}`, el.value);
        });
        
        const activeSelect = document.getElementById('active-provider');
        if (activeSelect) {
            const active = activeSelect.value;
            localStorage.setItem('ophi_active_provider', active);
            
            // Simpan model Groq
            if (active === 'groq') {
                const modelSelect = document.getElementById('groq-model-select');
                if (modelSelect) {
                    let groqModel = '';
                    if (modelSelect.value === 'custom') {
                        const customInput = document.getElementById('groq-model-custom');
                        groqModel = customInput ? customInput.value : '';
                    } else {
                        groqModel = modelSelect.value;
                    }
                    if (groqModel) localStorage.setItem('ophi_groq_model', groqModel);
                }
            }
        }
        
        togV(); 
        alert(`✅ Vault Locked.`);
    };

    // Fungsi callAI (sama seperti sebelumnya, dengan penanganan error)
    async function callAI(prompt, provider, apiKey) {
        switch(provider) {
            case 'gemini': {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`;
                const body = { contents: [{ parts: [{ text: prompt }] }] };
                try {
                    const resp = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
                    if (!resp.ok) {
                        const err = await resp.text();
                        return `❌ Gemini Error (${resp.status}): ${err}`;
                    }
                    const data = await resp.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || '❌ Gemini: Tidak ada respons.';
                } catch (e) {
                    return `❌ Gemini Exception: ${e.message}`;
                }
            }
            case 'groq': {
                const url = 'https://api.groq.com/openai/v1/chat/completions';
                const model = localStorage.getItem('ophi_groq_model') || 'llama-3.3-70b-versatile';
                const body = { model: model, messages: [{ role: 'user', content: prompt }] };
                try {
                    const resp = await fetch(url, { 
                        method: 'POST', 
                        headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify(body) 
                    });
                    if (!resp.ok) {
                        const err = await resp.text();
                        return `❌ Groq Error (${resp.status}): ${err}`;
                    }
                    const data = await resp.json();
                    return data.choices?.[0]?.message?.content || '❌ Groq: Tidak ada respons.';
                } catch (e) {
                    return `❌ Groq Exception: ${e.message}`;
                }
            }
            case 'openai': {
                const url = 'https://api.openai.com/v1/chat/completions';
                const body = { model: 'gpt-3.5-turbo', messages: [{ role: 'user', content: prompt }] };
                try {
                    const resp = await fetch(url, { 
                        method: 'POST', 
                        headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify(body) 
                    });
                    if (!resp.ok) {
                        const err = await resp.text();
                        return `❌ OpenAI Error (${resp.status}): ${err}`;
                    }
                    const data = await resp.json();
                    return data.choices?.[0]?.message?.content || '❌ OpenAI: Tidak ada respons.';
                } catch (e) {
                    return `❌ OpenAI Exception: ${e.message}`;
                }
            }
            default:
                return `⚠️ Provider ${provider} belum diimplementasikan. Gunakan Gemini, Groq, atau OpenAI.`;
        }
    }

    // Override handleSend dengan aman
    window.handleSend = async function() {
        if(sendBtn.classList.contains('ready')) {
            const userText = input.value;
            addMsg(userText, 'user');
            input.value = ""; 
            sync();

            const typingDiv = document.createElement('div');
            typingDiv.className = 'msg bot';
            typingDiv.innerText = "⏳ Ophiuchus AI sedang memproses...";
            document.getElementById('chat-box').appendChild(typingDiv);

            let activeProvider = localStorage.getItem('ophi_active_provider') || 'gemini';
            let apiKey = localStorage.getItem(`ophi_${activeProvider}`);

            if (!apiKey) {
                typingDiv.remove();
                botSay(`⚠️ API Key untuk ${activeProvider} tidak ditemukan. Buka Vault, tempel key-nya, pili
